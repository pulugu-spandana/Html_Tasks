<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web Tech Icons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 30px;
      color: darkblue;
    }
    .card {
      display: inline-block;
      width: 200px;
      margin: 20px;
      padding: 15px;
      border: 2px solid #ccc;
      border-radius: 12px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100px;
      height: 100px;
    }
    .download {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
    .download:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Web Development Icons</h1>

  <!-- HTML Icon -->
  <div class="card">
    <h3>HTML</h3>
    <img src="images/html.png" alt="HTML Icon">
    <br>
    <a href="images/html.png" download class="download">⬇ Download</a>
  </div>

  <!-- CSS Icon -->
  <div class="card">
    <h3>CSS</h3>
    <img src="images/css.png" alt="CSS Icon">
    <br>
    <a href="images/css.png" download class="download">⬇ Download</a>
  </div>

  <!-- JavaScript Icon -->
  <div class="card">
    <h3>JavaScript</h3>
    <img src="images/js.png" alt="JavaScript Icon">
    <br>
    <a href="images/js.png" download class="download">⬇ Download</a>
  </div>

</body>
</html>
